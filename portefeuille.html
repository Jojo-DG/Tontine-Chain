<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="user-role" content="">
  <title>Portefeuille — Tontine Chain</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/blockchain.js"></script>
  <script src="assets/js/layout.js"></script>
</head>
<body class="pt-16 md:pl-64 bg-gray-50 min-h-screen">
  <main class="p-6 max-w-4xl mx-auto space-y-6">
    <div id="loading" class="space-y-4">
      <div class="skeleton h-32 rounded-xl"></div>
      <div class="skeleton h-32 rounded-xl"></div>
      <div class="skeleton h-40 rounded-xl"></div>
    </div>

    <div id="content" class="hidden space-y-6">
      <!-- Polygon Wallet -->
      <div class="bg-[--primary] text-white rounded-xl p-8 shadow-lg relative overflow-hidden">
        <div class="absolute top-0 right-0 p-4 opacity-20">
          <i data-lucide="wallet" class="w-24 h-24"></i>
        </div>
        <div class="relative z-10">
          <p class="text-white/70 text-sm mb-1">Solde Polygon (Mumbai)</p>
          <div class="text-4xl font-bold mb-4" id="matic-balance">0.00 MATIC</div>
          <div class="space-y-1">
            <p class="text-xs text-white/60">Adresse du wallet</p>
            <div class="flex items-center gap-2">
              <code id="wallet-address" class="bg-white/10 px-2 py-1 rounded text-xs">0x...</code>
              <button onclick="copyAddress()" class="hover:text-[--accent]"><i data-lucide="copy" class="w-4 h-4"></i></button>
            </div>
          </div>
        </div>
      </div>

      <div class="grid md:grid-cols-2 gap-4">
        <div class="bg-white rounded-xl p-6 border">
          <h3 class="font-semibold mb-2">Recharger</h3>
          <p class="text-sm text-gray-500 mb-4">Ajoutez des fonds via Mobile Money pour vos cotisations.</p>
          <button onclick="showToast('Bientôt disponible via FedaPay', 'info')" class="btn-primary w-full">Recharger via Mobile Money</button>
        </div>
        <div class="bg-white rounded-xl p-6 border">
          <h3 class="font-semibold mb-2">Polygonscan</h3>
          <p class="text-sm text-gray-500 mb-4">Consultez vos transactions sur l'explorateur de blocs.</p>
          <a id="polygon-link" href="#" target="_blank" class="btn-outline w-full block text-center">Voir mes transactions</a>
        </div>
      </div>
    </div>
  </main>

  <script>
    (async () => {
      try {
        const res = await apiFetch('/wallets/balance');
        document.getElementById('loading').remove();
        document.getElementById('content').classList.remove('hidden');

        const w = res.data;
        document.getElementById('matic-balance').textContent = `${parseFloat(w.balance_matic).toFixed(4)} MATIC`;
        document.getElementById('wallet-address').textContent = w.wallet_address;
        document.getElementById('polygon-link').href = `${CONFIG.POLYGONSCAN_URL}/address/${w.wallet_address}`;
      } catch(e) {
        if (e.message.includes('Aucun wallet')) {
          document.getElementById('loading').innerHTML = `
            <div class="bg-white p-8 rounded-xl text-center shadow-sm">
              <i data-lucide="alert-circle" class="w-12 h-12 text-[--warning] mx-auto mb-4"></i>
              <h3 class="text-lg font-bold">Aucun wallet trouvé</h3>
              <p class="text-gray-600 mb-6">Vous devez créer un wallet pour commencer à utiliser Tontine Chain.</p>
              <button id="create-wallet-btn" class="btn-primary">Créer mon wallet Polygon</button>
            </div>`;
          document.getElementById('create-wallet-btn').addEventListener('click', createWallet);
        } else {
          showToast(e.message, 'error');
        }
      }
    })();

    async function createWallet() {
      const btn = document.getElementById('create-wallet-btn');
      showSpinner(btn);
      try {
        await apiFetch('/wallets/create', { method: 'POST' });
        showToast('Wallet créé avec succès !', 'success');
        location.reload();
      } catch(e) {
        hideSpinner(btn, 'Créer mon wallet Polygon');
        showToast(e.message, 'error');
      }
    }

    function copyAddress() {
      const addr = document.getElementById('wallet-address').textContent;
      navigator.clipboard.writeText(addr);
      showToast('Adresse copiée !', 'success');
    }
  </script>
</body>
</html>
