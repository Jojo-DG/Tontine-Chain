<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="user-role" content="">
  <title>Rejoindre une tontine — Tontine Chain</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/layout.js"></script>
</head>
<body class="pt-16 md:pl-64 bg-gray-50 min-h-screen">
  <main class="p-6 max-w-md mx-auto">
    <div class="bg-white rounded-xl shadow p-8 text-center">
      <i data-lucide="users" class="w-12 h-12 text-[--accent] mx-auto mb-4"></i>
      <h1 class="text-2xl font-bold mb-2">Rejoindre une tontine</h1>
      <p class="text-gray-600 mb-6">Entrez l'identifiant (ID) de la tontine et le code d'invitation.</p>
      <form id="join-form" class="space-y-4">
        <div>
          <label class="block text-sm text-left font-medium mb-1">ID de la tontine</label>
          <input type="text" id="tontine-id" class="w-full border rounded-lg px-3 py-2" placeholder="ID (ex: UUID)" required>
        </div>
        <div>
          <label class="block text-sm text-left font-medium mb-1">Code d'invitation</label>
          <input type="text" id="invite-code" maxlength="8" class="w-full border rounded-lg px-3 py-3 text-center text-xl tracking-widest uppercase" placeholder="XXXXXXXX" required>
        </div>
        <button type="submit" id="join-btn" class="btn-primary w-full py-2.5">Rejoindre la tontine</button>
      </form>
      <div id="result-message" class="mt-4"></div>
    </div>
  </main>

  <script>
    document.getElementById('join-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('join-btn');
      showSpinner(btn);
      const tId = document.getElementById('tontine-id').value.trim();
      const code = document.getElementById('invite-code').value.trim().toUpperCase();
      try {
        await apiFetch(`/tontines/${tId}/join`, {
          method: 'POST',
          body: JSON.stringify({ invitation_code: code })
        });
        hideSpinner(btn, 'Rejoindre la tontine');
        document.getElementById('result-message').innerHTML = `<div class="bg-green-50 p-3 rounded text-green-700">Demande envoyée avec succès !</div>`;
        setTimeout(() => window.location.href = 'dashboard-membre.html', 2000);
      } catch (err) {
        hideSpinner(btn, 'Rejoindre la tontine');
        if (err.code === 'INVITATION_CODE_INVALID') showBanner(document.querySelector('.bg-white'), 'Code d\'invitation invalide.', 'error');
        else if (err.code === 'TONTINE_FULL') showBanner(document.querySelector('.bg-white'), 'Cette tontine est complète.', 'error');
        else showBanner(document.querySelector('.bg-white'), err.message, 'error');
      }
    });
  </script>
</body>
</html>
