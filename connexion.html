<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Tontine Chain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="auth-bg">
    <div class="auth-topnav">
        <a class="auth-topnav__brand" href="index.html" aria-label="Retour à l'accueil">
            <span class="app-brand__mark" style="background:rgba(255,255,255,0.10);box-shadow:none;">
                <i data-lucide="layers" class="w-5 h-5" style="color:white;"></i>
            </span>
            <span>Tontine <span class="text-accent">Chain</span></span>
        </a>
        <div class="auth-topnav__links">
            <a class="auth-topnav__link" href="presentation.html"><i data-lucide="sparkles" class="w-4 h-4"></i>Présentation</a>
            <a class="auth-topnav__link" href="inscription.html"><i data-lucide="user-plus" class="w-4 h-4"></i>Inscription</a>
        </div>
    </div>
    <div class="auth-shell">
    <div class="auth-wrap animate-fade-up">
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-3 mb-4">
                <div class="bg-accent p-3 rounded-2xl shadow-lg shadow-emerald-500/20">
                    <i data-lucide="layers" class="w-8 h-8 text-white"></i>
                </div>
            </div>
            <h1 class="text-3xl font-extrabold text-white tracking-tight">Ravi de vous revoir !</h1>
            <p class="text-blue-200 mt-2">Connectez-vous à votre espace sécurisé.</p>
        </div>

        <div class="glass-card p-10">
            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-widest">Numéro de téléphone</label>
                    <div class="relative">
                        <i data-lucide="phone" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input type="tel" id="phone" placeholder="+229 XX XX XX XX" required 
                            class="w-full bg-gray-50 border border-gray-100 rounded-xl py-3 pl-12 pr-4 focus:ring-2 focus:ring-accent outline-none transition font-semibold">
                    </div>
                </div>
                
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-bold text-gray-700 uppercase tracking-widest">Mot de passe</label>
                        <a href="#" class="text-xs font-bold text-accent hover:underline">Oublié ?</a>
                    </div>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input type="password" id="password" required 
                            class="w-full bg-gray-50 border border-gray-100 rounded-xl py-3 pl-12 pr-12 focus:ring-2 focus:ring-accent outline-none transition font-semibold">
                        <button type="button" id="toggle-password" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="login-btn" class="btn-primary w-full py-4 text-lg shadow-xl shadow-emerald-500/20">
                    Se connecter
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-gray-100 text-center">
                <p class="text-gray-500 font-medium">Pas encore de compte ?</p>
                <a href="inscription.html" class="inline-block mt-2 font-extrabold text-primary hover:text-accent transition underline decoration-2 underline-offset-4">
                    Créer mon espace gratuitement
                </a>
            </div>
        </div>
        
        <p class="text-center mt-8 text-blue-200/50 text-xs font-bold uppercase tracking-widest">Sécurisé par la technologie Blockchain</p>
    </div>

    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/utils.js"></script>
    <script>
        lucide.createIcons();
        document.getElementById('toggle-password').addEventListener('click', function() {
            const pwd = document.getElementById('password');
            const icon = this.querySelector('i');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                pwd.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            showSpinner(btn);
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;

            try {
                await login(phone, password);
                hideSpinner(btn, 'Se connecter');
                const role = getRole();
                window.location.href = role === 'ORGANIZER' ? 'dashboard-admin.html' : 'dashboard-membre.html';
            } catch (err) {
                hideSpinner(btn, 'Se connecter');
                showBanner(document.querySelector('.glass-card'), getFriendlyMessage(err), 'error');
            }
        });
    </script>
</body>
</html>
