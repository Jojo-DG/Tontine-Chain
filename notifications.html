<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="user-role" content="">
  <title>Notifications — Tontine Chain</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/layout.js"></script>
</head>
<body class="pt-16 md:pl-64 bg-gray-50 min-h-screen">
  <main class="p-6 max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">Notifications</h1>
    <div id="notif-list" class="space-y-3">
      <div class="skeleton h-16 rounded-xl"></div>
      <div class="skeleton h-16 rounded-xl"></div>
    </div>
    <div id="empty-state" class="hidden text-center py-16">
      <i data-lucide="bell-off" class="w-16 h-16 text-gray-300 mx-auto mb-4"></i>
      <p class="text-gray-500">Aucune notification pour le moment.</p>
    </div>
  </main>

  <script>
    (async () => {
      try {
        // Simuler les notifications via GET /tontines + analyse
        const tontinesData = await apiFetch('/tontines');
        const tontines = tontinesData.data || [];
        const notifications = [];
        tontines.forEach(t => {
          if (t.current_cycle?.deadline) {
            const daysLeft = Math.ceil((new Date(t.current_cycle.deadline) - new Date()) / (1000*60*60*24));
            if (daysLeft <= 3 && daysLeft > 0) {
              notifications.push({ type: 'deadline', message: `Échéance à venir pour "${t.name}" dans ${daysLeft} jour(s)`, icon: 'calendar', color: 'orange' });
            }
          }
          if (t.my_contribution_status === 'PAID') {
            notifications.push({ type: 'payment', message: `Cotisation confirmée pour "${t.name}"`, icon: 'check-circle-2', color: 'green' });
          }
        });
        document.querySelectorAll('.skeleton').forEach(s => s.remove());
        if (notifications.length === 0) {
          document.getElementById('empty-state').classList.remove('hidden');
        } else {
          document.getElementById('notif-list').innerHTML = notifications.map(n => `
            <div class="bg-white rounded-xl p-4 flex items-center gap-3">
              <i data-lucide="${n.icon}" class="w-5 h-5 text-${n.color === 'green' ? '[--accent]' : n.color === 'orange' ? '[--warning]' : '[--primary]'}"></i>
              <p class="text-sm">${n.message}</p>
            </div>
          `).join('');
          lucide.createIcons();
        }
      } catch(e) {
        showToast('Impossible de charger les notifications', 'error');
      }
    })();
  </script>
</body>
</html>
